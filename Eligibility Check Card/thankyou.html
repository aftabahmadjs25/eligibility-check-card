<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You | Simply Medical Cards</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Premium Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">

    <style>
        /* Scoped styles for the eligibility component */
        .smc-eligibility-component {
            --smc-vibrant-green: #48bb2b;
            --smc-icon-yellow: #f1c40f;
            --smc-text-black: #1a1a1a;
            --smc-text-gray: #666;
            --smc-bg-light: #f9fbf9;
            --smc-border-radius: 40px;
            --smc-shadow: 0 15px 45px rgba(0, 0, 0, 0.08);

            font-family: 'Outfit', sans-serif;
            color: var(--smc-text-black);
            max-width: 1000px;
            margin: 40px auto;
        }

        .smc-eligibility-component .main-card {
            background: #fff;
            border-radius: 30px;
            box-shadow: var(--smc-shadow);
            border: 1px solid #eee;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 600px;
        }

        /* Thank You Content Styling */
        .smc-eligibility-component .thankyou-container {
            width: 100%;
            padding: 60px 50px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .smc-eligibility-component .success-icon {
            width: 100px;
            height: 100px;
            background-color: var(--smc-vibrant-green);
            color: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(72, 187, 43, 0.3);
            animation: scaleIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes scaleIn {
            0% {
                transform: scale(0);
                opacity: 0;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .smc-eligibility-component .status-tag {
            background-color: rgba(72, 187, 43, 0.1);
            color: var(--smc-vibrant-green);
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 20px;
        }

        .smc-eligibility-component .thankyou-title {
            font-size: 2.8rem;
            font-weight: 800;
            margin-bottom: 15px;
            color: var(--smc-text-black);
        }

        .smc-eligibility-component .thankyou-desc {
            color: var(--smc-text-gray);
            margin-bottom: 40px;
            font-size: 1.1rem;
            line-height: 1.6;
            max-width: 500px;
        }

        /* Modern Return Button */
        .smc-eligibility-component .return-btn {
            background-color: var(--smc-vibrant-green);
            color: #fff;
            border: none;
            border-radius: 50px;
            padding: 15px 40px;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 15px;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 20px rgba(72, 187, 43, 0.2);
        }

        .smc-eligibility-component .return-btn:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 15px 30px rgba(241, 196, 15, 0.4);
            background-color: var(--smc-icon-yellow);
            color: var(--smc-text-black);
        }

        .smc-eligibility-component .arrow-circle {
            width: 32px;
            height: 32px;
            background-color: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            transition: all 0.3s ease;
        }

        .smc-eligibility-component .return-btn:hover .arrow-circle {
            transform: translateX(-5px) scale(1.1);
            background-color: var(--smc-vibrant-green);
            color: #fff;
        }

        /* Layout Tweaks */
        @media (max-width: 768px) {
            .smc-eligibility-component .thankyou-container {
                padding: 60px 30px;
            }

            .smc-eligibility-component .thankyou-title {
                font-size: 2.2rem;
            }
        }
    </style>
</head>

<body style="background-color: transparent; margin: 0; padding: 20px;">

    <div class="smc-eligibility-component">
        <div class="main-card">

            <!-- THANK YOU MESSAGE -->
            <div class="thankyou-container">
                <div class="success-icon">
                    <svg width="50" height="50" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"></path>
                    </svg>
                </div>

                <div class="status-tag">Submission Received</div>

                <h1 class="thankyou-title">Thank You!</h1>
                <p class="thankyou-desc">
                    Your eligibility check has been submitted successfully. One of our state-certified specialists will
                    review your details and contact you shortly to guide you through the next steps.
                </p>

                <a href="index.html" class="return-btn">
                    <div class="arrow-circle">
                        <svg width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                            <path fill-rule="evenodd"
                                d="M15 8a.5.5 0 0 0-.5-.5H2.707l3.147-3.146a.5.5 0 1 0-.708-.708l-4 4a.5.5 0 0 0 0 .708l4 4a.5.5 0 0 0 .708-.708L2.707 8.5H14.5A.5.5 0 0 0 15 8z" />
                        </svg>
                    </div>
                    Return to Form
                </a>
            </div>

        </div>
    </div>

    <!-- Bootstrap 5 Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
